---
name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Bifrost CI — the Builder-System delivery gate, adapted to the Swift/iOS stack
# (ADR-0050 §1). Two jobs:
#   1. governance — always meaningful today: fails loud if the repo's own
#      governance scaffolding (templates, AGENTS.md, skills routing) regresses.
#      This keeps CI honest before app sources exist (no false green).
#   2. swift — strict lint, Swift package tests, and the shared Yggdrasil scheme's
#      unit + UI tests on iPhone and iPad simulators selected from the installed runtime.

jobs:
  governance:
    name: Governance scaffolding gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required governance files present
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "AGENTS.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/task.yml"
            ".github/ISSUE_TEMPLATE/config.yml"
            ".codex/skills/README.md"
            ".codex/skills/_shared/ISSUE_CONTRACT.md"
            ".codex/skills/_shared/LABEL_TAXONOMY.md"
            "README.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then echo "::error file=$f::required governance file missing"; missing=1; fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Governance scaffolding regressed — see errors above."; exit 1
          fi
          echo "All required governance files present."
      - name: Constituent declaration intact
        shell: bash
        run: |
          set -euo pipefail
          grep -qi "governed constituent" README.md \
            || { echo "::error::README must declare Bifrost a governed Yggdrasil constituent"; exit 1; }
          grep -q "ADR-0050" AGENTS.md \
            || { echo "::error::AGENTS.md must recognize ecosystem ADR-0050 authority"; exit 1; }
          echo "Constituent declaration + inherited authority present."

  swift:
    name: Swift lint + package + app builds
    # macos-26 only ships Xcode/iOS 26; Bifrost's established UI automation
    # contract is on Xcode 16 and iOS 18 (see the PR compatibility note).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint (strict)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version
          swiftlint lint --strict --config .swiftlint.yml
      - name: YggdrasilCore package tests
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path Packages/YggdrasilCore
      - name: Discover Xcode and available iPhone/iPad/Watch simulators
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          simulator_sdk_version="$(xcrun --sdk iphonesimulator --show-sdk-version)"
          watch_simulator_sdk_version="$(xcrun --sdk watchsimulator --show-sdk-version)"
          echo "Selected Xcode iOS Simulator SDK: $simulator_sdk_version"
          echo "Selected Xcode watchOS Simulator SDK: $watch_simulator_sdk_version"
          xcrun simctl list runtimes available
          xcrun simctl list devices available
          xcrun simctl list devices available --json > "$RUNNER_TEMP/simulators.json"
          export SIMULATOR_SDK_VERSION="$simulator_sdk_version"
          export WATCH_SIMULATOR_SDK_VERSION="$watch_simulator_sdk_version"
          python3 <<'PY'
          import json
          import os
          import re
          import sys

          with open(os.path.join(os.environ["RUNNER_TEMP"], "simulators.json"), encoding="utf-8") as handle:
              devices_by_runtime = json.load(handle).get("devices", {})

          sdk_version = tuple(int(part) for part in os.environ["SIMULATOR_SDK_VERSION"].split("."))
          watch_sdk_version = tuple(int(part) for part in os.environ["WATCH_SIMULATOR_SDK_VERSION"].split("."))
          candidates = {"iphone": [], "ipad": [], "watch": []}
          for runtime, devices in devices_by_runtime.items():
              match = re.search(r"SimRuntime\.(iOS|watchOS)-(\d+(?:-\d+)*)$", runtime)
              if not match:
                  continue
              platform, raw_version = match.groups()
              version = tuple(int(part) for part in raw_version.split("-"))
              maximum_version = sdk_version if platform == "iOS" else watch_sdk_version
              if version > maximum_version:
                  continue
              for device in devices:
                  name = device.get("name", "")
                  if not device.get("isAvailable"):
                      continue
                  for family, prefix in (("iphone", "iPhone"), ("ipad", "iPad")):
                      if name.startswith(prefix):
                          candidates[family].append((version, name, device["udid"], runtime))
                  if platform == "watchOS" and name.startswith("Apple Watch"):
                      candidates["watch"].append((version, name, device["udid"], runtime))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for family in ("iphone", "ipad", "watch"):
                  if not candidates[family]:
                      print(
                          f"::error::The selected Xcode has no compatible available {family} simulator. "
                          "See the Xcode SDK, runtime, and device lists above."
                      )
                      sys.exit(1)
                  version, name, udid, runtime = max(
                      candidates[family], key=lambda item: (item[0], item[1])
                  )
                  destination_platform = "watchOS Simulator" if family == "watch" else "iOS Simulator"
                  output.write(f"{family}_destination=platform={destination_platform},id={udid}\n")
                  print(
                      f"Selected {name} on {runtime} ({'.'.join(map(str, version))}); "
                      "UDID discovered at runtime."
                  )
          PY
      - name: Build and test shared Yggdrasil scheme on iPhone and iPad
        timeout-minutes: 30
        shell: bash
        run: |
          set -euo pipefail
          destinations=(
            '${{ steps.simulator.outputs.iphone_destination }}'
            '${{ steps.simulator.outputs.ipad_destination }}'
          )
          for destination in "${destinations[@]}"; do
            echo "Testing destination: $destination"
            xcodebuild test \
              -project Yggdrasil/Yggdrasil.xcodeproj \
              -scheme Yggdrasil \
              -destination "$destination" \
              -derivedDataPath "$RUNNER_TEMP/DerivedData" \
              -parallel-testing-enabled NO \
              -maximum-concurrent-test-simulator-destinations 1 \
              CODE_SIGNING_ALLOWED=NO
          done
      - name: Build the Yggdrasil Watch companion
        timeout-minutes: 15
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild build \
            -project Yggdrasil/Yggdrasil.xcodeproj \
            -scheme YggdrasilWatch \
            -destination '${{ steps.simulator.outputs.watch_destination }}' \
            -derivedDataPath "$RUNNER_TEMP/WatchDerivedData" \
            CODE_SIGNING_ALLOWED=NO
