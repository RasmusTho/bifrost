---
name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Bifrost CI — the Builder-System delivery gate, adapted to the Swift/iOS stack
# (ADR-0050 §1). Two jobs:
#   1. governance — always meaningful today: fails loud if the repo's own
#      governance scaffolding (templates, AGENTS.md, skills routing) regresses.
#      This keeps CI honest before app sources exist (no false green).
#   2. swift — strict lint, Swift package tests, and the shared Yggdrasil scheme's
#      unit + UI tests on an iPad simulator selected from the installed runtime.

jobs:
  governance:
    name: Governance scaffolding gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Required governance files present
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "AGENTS.md"
            ".github/pull_request_template.md"
            ".github/ISSUE_TEMPLATE/task.yml"
            ".github/ISSUE_TEMPLATE/config.yml"
            ".codex/skills/README.md"
            ".codex/skills/_shared/ISSUE_CONTRACT.md"
            ".codex/skills/_shared/LABEL_TAXONOMY.md"
            "README.md"
          )
          missing=0
          for f in "${required[@]}"; do
            if [[ ! -f "$f" ]]; then echo "::error file=$f::required governance file missing"; missing=1; fi
          done
          if [[ "$missing" -ne 0 ]]; then
            echo "Governance scaffolding regressed — see errors above."; exit 1
          fi
          echo "All required governance files present."
      - name: Constituent declaration intact
        shell: bash
        run: |
          set -euo pipefail
          grep -qi "governed constituent" README.md \
            || { echo "::error::README must declare Bifrost a governed Yggdrasil constituent"; exit 1; }
          grep -q "ADR-0050" AGENTS.md \
            || { echo "::error::AGENTS.md must recognize ecosystem ADR-0050 authority"; exit 1; }
          echo "Constituent declaration + inherited authority present."

  swift:
    name: Swift lint + package + iOS tests
    # macos-26 only ships Xcode/iOS 26; Bifrost's established UI automation
    # contract is on Xcode 16 and iOS 18 (see the PR compatibility note).
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: SwiftLint (strict)
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v swiftlint >/dev/null 2>&1; then
            brew install swiftlint
          fi
          swiftlint version
          swiftlint lint --strict --config .swiftlint.yml
      - name: YggdrasilCore package tests
        shell: bash
        run: |
          set -euo pipefail
          swift test --package-path Packages/YggdrasilCore
      - name: Discover Xcode and an available iPad simulator
        id: simulator
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          simulator_sdk_version="$(xcrun --sdk iphonesimulator --show-sdk-version)"
          echo "Selected Xcode iOS Simulator SDK: $simulator_sdk_version"
          xcrun simctl list runtimes available
          xcrun simctl list devices available
          xcrun simctl list devices available --json > "$RUNNER_TEMP/simulators.json"
          export SIMULATOR_SDK_VERSION="$simulator_sdk_version"
          python3 <<'PY'
          import json
          import os
          import re
          import sys

          with open(os.path.join(os.environ["RUNNER_TEMP"], "simulators.json"), encoding="utf-8") as handle:
              devices_by_runtime = json.load(handle).get("devices", {})

          sdk_version = tuple(int(part) for part in os.environ["SIMULATOR_SDK_VERSION"].split("."))
          candidates = []
          for runtime, devices in devices_by_runtime.items():
              match = re.search(r"SimRuntime\.iOS-(\d+(?:-\d+)*)$", runtime)
              if not match:
                  continue
              version = tuple(int(part) for part in match.group(1).split("-"))
              if version > sdk_version:
                  continue
              for device in devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPad"):
                      candidates.append((version, device["name"], device["udid"], runtime))

          if not candidates:
              print(
                  "::error::The selected Xcode has no compatible available iPad simulator. "
                  "See the Xcode SDK, runtime, and device lists above."
              )
              sys.exit(1)

          version, name, udid, runtime = max(candidates, key=lambda item: (item[0], item[1]))
          destination = f"platform=iOS Simulator,id={udid}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"destination={destination}\n")
          print(f"Selected {name} on {runtime} ({'.'.join(map(str, version))}); UDID discovered at runtime.")
          PY
      - name: Build and test shared Yggdrasil scheme on iPad
        timeout-minutes: 30
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild test \
            -project Yggdrasil/Yggdrasil.xcodeproj \
            -scheme Yggdrasil \
            -destination '${{ steps.simulator.outputs.destination }}' \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            -parallel-testing-enabled NO \
            -maximum-concurrent-test-simulator-destinations 1 \
            CODE_SIGNING_ALLOWED=NO
