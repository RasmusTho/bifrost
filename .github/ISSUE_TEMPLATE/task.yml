name: Task
description: Structured task contract for human and agent execution (Bifrost / Swift stack)
title: "task: "
labels: ["type:task"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for implementation/delivery task contracts that can be executed by builders and coding agents.
        Bifrost is a governed Yggdrasil constituent (ADR-0050); this contract mirrors the hub repo's Issue contract,
        adapted for the Swift/iOS/iPadOS/watchOS stack. New backlog work must include stable source anchors so intent
        can be traced without relying on unmerged inline `Tracked by` markers.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why this task exists and what repo/runtime/docs context matters.
      placeholder: Describe the relevant current-state context.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Exact bounded work to perform.
      placeholder: List the bounded implementation/doc/test changes that are in scope.
    validations:
      required: true
  - type: textarea
    id: source_anchors
    attributes:
      label: Source Anchors
      description: Stable doc item identifiers (hub ADRs/docs or this repo) that justify this issue.
      placeholder: |
        - RasmusTho/agentic-pkm-mvp :: docs/adr/ADR-0049 §4 (topology C)
        - RasmusTho/agentic-pkm-mvp :: Epic B #3020
    validations:
      required: true
  - type: textarea
    id: sbs_impact
    attributes:
      label: SBS Impact
      description: |
        Target System Breakdown Structure classification for routing, boundary review, and follow-up ownership.
        Classify per the hub's docs/architecture/SBS_OPERATING_MODEL.md §3, then fill impact per §4; use "none"/"unaffected"
        explicitly rather than leaving a field blank. Bifrost is a Product/Runtime System surface built by the Builder System.
      placeholder: |
        - Primary subsystem:
        - Secondary subsystem(s):
        - Write class:
        - Authority impact:
        - Persistence impact:
        - Human knowledge impact:
        - Sync/deployment impact:
        - External boundary impact:
        - New or changed contract:
        - Owner-doc impact:
        - Transition debt impact:
        - Boundary risk:
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Architectural, runtime, safety, or process constraints that must be respected.
      placeholder: |
        Include boundaries such as: markdown vault stays source of record, no app-only capability,
        each client binds only its own constituent's contract, docs-in-same-change.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: |
        Concrete done conditions. Every item must carry an inline `Verify:` marker naming a concrete verification target:
        - Behavioral AC → test pointer: `Verify: <TestTarget>/<TestCase>.<test_method>` (the test may be new; the name is the commitment)
        - Non-behavioral AC → explicit target: doc writeback path plus anchor, build product, or runtime receipt
        ACs without a resolvable `Verify:` target are not executable and must be refined before the Issue is marked ready.
      placeholder: |
        - [ ] <behavioral outcome>
          Verify: `MimerClientTests/CaptureFlowTests.testConsentGate`
        - [ ] <doc/build outcome>
          Verify: `xcodebuild build` succeeds for scheme `Bifrost`
    validations:
      required: true
  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: Explicitly excluded work.
      placeholder: State what this task must not change.
    validations:
      required: true
  - type: textarea
    id: suggested_validation
    attributes:
      label: Suggested Validation
      description: |
        Exact commands or checks that execute the `Verify:` targets declared in Acceptance Criteria.
      placeholder: |
        - `xcodebuild build -scheme Bifrost -destination 'platform=iOS Simulator,name=iPhone 15'`
        - `xcodebuild test -scheme Bifrost -destination '...'`
        - `swiftlint`
        - doc check: `docs/<PATH>.md :: <anchor>` present after change
    validations:
      required: true
  - type: textarea
    id: source_docs
    attributes:
      label: Source Docs
      description: Governing docs that define the current-state or forward-line basis.
      placeholder: |
        - RasmusTho/agentic-pkm-mvp :: docs/adr/ADR-0050
        - AGENTS.md (this repo)
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - prio:high
        - prio:med
        - prio:low
      default: 1
    validations:
      required: true
  - type: dropdown
    id: agent_state
    attributes:
      label: Agent State
      options:
        - agent:needs-human
        - agent:ready
        - agent:blocked
      default: 0
    validations:
      required: true
